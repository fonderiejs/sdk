name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Opens/updates the "Version Packages" PR when changesets are pending;
      # publishes to npm when that PR is merged.
      - uses: changesets/action@v1
        with:
          # `version` regenerates brain.json after the bumps so its sdkVersions
          # match the new package versions — otherwise the docs:brain freshness
          # gate fails on the very next push (learned the hard way, 2026-07-20).
          version: npm run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's registry-url writes an .npmrc that reads
          # NODE_AUTH_TOKEN, so the automation token must be exposed under
          # that name — providing only NPM_TOKEN leaves npm publish
          # unauthenticated. Both are set so either resolution path works.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Generate npm provenance (the id-token: write permission above
          # exists for this). Requires an automation token + OIDC, both
          # present in this job.
          NPM_CONFIG_PROVENANCE: true
